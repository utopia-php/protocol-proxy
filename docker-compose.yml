version: '3.8'

services:

  mariadb:
    image: mariadb:11.2
    container_name: protocol-proxy-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appwrite
      MYSQL_USER: appwrite
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - protocol-proxy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: protocol-proxy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - protocol-proxy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  http-proxy:
    build: .
    container_name: protocol-proxy-http
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: appwrite
      DB_PASS: password
      DB_NAME: appwrite
      REDIS_HOST: redis
      REDIS_PORT: 6379
      COMPUTE_API_URL: http://appwrite/v1/compute
      COMPUTE_API_KEY: ""
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - protocol-proxy
    command: php proxies/http.php

  tcp-proxy:
    build: .
    container_name: protocol-proxy-tcp
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: appwrite
      DB_PASS: password
      DB_NAME: appwrite
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - protocol-proxy
    command: php proxies/tcp.php

  smtp-proxy:
    build: .
    container_name: protocol-proxy-smtp
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: appwrite
      DB_PASS: password
      DB_NAME: appwrite
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - protocol-proxy
    command: php proxies/smtp.php

networks:
  protocol-proxy:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
